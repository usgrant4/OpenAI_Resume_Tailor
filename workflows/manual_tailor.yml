name: 'Manual Resume Tailor'

# This allows the workflow to be triggered manually from the Actions tab
on:
  workflow_dispatch:
    inputs:
      resume_path:
        description: 'Path to the resume file (e.g., resume/my_resume.pdf)'
        required: true
        default: 'resume/Ulysses_Grant.md'
      jd_path:
        description: 'Path to the job description file (e.g., resume/job_description.md)'
        required: true
        default: 'resume/job_description.md'
      output_path:
        description: 'Name for the output file'
        required: true
        default: 'Tailored_Resume.md'
      dry_run:
        description: 'Run without calling the API (true/false)'
        required: true
        type: boolean
        default: false

jobs:
  tailor-resume:
    runs-on: ubuntu-latest

    steps:
    - name: 'Checkout Repository'
      uses: actions/checkout@v4

    - name: 'Set up Python 3.11'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 'Install Dependencies'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 'Build the Command'
      id: build_command
      run: |
        # Start with the base command
        CMD="python tailor_resume.py --out ${{ github.event.inputs.output_path }}"

        # Dynamically determine the resume argument based on file extension
        RESUME_PATH="${{ github.event.inputs.resume_path }}"
        if [[ "$RESUME_PATH" == *.pdf ]]; then
          CMD="$CMD --resume-pdf $RESUME_PATH"
        elif [[ "$RESUME_PATH" == *.docx ]]; then
          CMD="$CMD --resume-docx $RESUME_PATH"
        else
          CMD="$CMD --resume-md $RESUME_PATH"
        fi

        # Add the job description argument
        CMD="$CMD --jd ${{ github.event.inputs.jd_path }}"

        # Add the dry-run flag if set to true
        if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
          CMD="$CMD --dry-run"
        fi

        echo "command=$CMD" >> $GITHUB_OUTPUT

    - name: 'Run Python Script'
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: ${{ steps.build_command.outputs.command }}

    - name: 'Upload Tailored Resume as Artifact'
      if: github.event.inputs.dry_run == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: tailored-resume
        path: ${{ github.event.inputs.output_path }}
