name: 'Manual Resume Tailor'

on:
  # This keeps the manual "Run workflow" button in the Actions tab
  workflow_dispatch:
    inputs:
      resume_path:
        description: 'Path to the resume file (e.g., resume/my_resume.pdf)'
        required: true
        default: 'resume/Ulysses_Grant.md'
      jd_path:
        description: 'Path to the job description file (e.g., resume/job_description.md)'
        required: true
        default: 'resume/job_description.md'
      output_path:
        description: 'Name for the output file (e.g., Tailored_Resume.md)'
        required: true
        default: 'Tailored_Resume.md'
      export_format:
        description: 'Export format (docx, pdf, or none)'
        required: false
        type: choice
        options:
          - none
          - docx
          - pdf
        default: 'none'
      dry_run:
        description: 'Run without calling the API (true/false)'
        required: true
        type: boolean
        default: false

  # This adds an automatic trigger for push events to the specified branches
  push:
    branches:
      - main
      - dev

jobs:
  tailor-resume:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Set up Python 3.11'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 'Install LaTeX (for PDF export)'
        # This condition now checks both manual and push events
        if: github.event.inputs.export_format == 'pdf'
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra

      - name: 'Install Dependencies'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 'Build the Command'
        id: build_command
        run: |
          # --- Set default values for automatic push events ---
          # If run manually, these will be replaced by user inputs.
          # If run by push, these defaults will be used.
          RESUME_PATH="${{ github.event.inputs.resume_path || 'resume/Ulysses_Grant.md' }}"
          JD_PATH="${{ github.event.inputs.jd_path || 'resume/job_description.md' }}"
          OUTPUT_PATH="${{ github.event.inputs.output_path || 'Tailored_Resume.md' }}"
          EXPORT_FORMAT="${{ github.event.inputs.export_format || 'none' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          # --- Construct the command string ---
          CMD="python tailor_resume.py --out $OUTPUT_PATH"
          
          if [[ "$RESUME_PATH" == *.pdf ]]; then
            CMD="$CMD --resume-pdf $RESUME_PATH"
          elif [[ "$RESUME_PATH" == *.docx ]]; then
            CMD="$CMD --resume-docx $RESUME_PATH"
          else
            CMD="$CMD --resume-md $RESUME_PATH"
          fi
          
          CMD="$CMD --jd $JD_PATH"
          
          if [[ "$EXPORT_FORMAT" != "none" ]]; then
            CMD="$CMD --export-format $EXPORT_FORMAT"
          fi
          
          if [[ "$DRY_RUN" == "true" ]]; then
            CMD="$CMD --dry-run"
          fi
          
          echo "command=$CMD" >> $GITHUB_OUTPUT
          
          # --- Calculate the exported file path for the artifact upload step ---
          if [[ "$EXPORT_FORMAT" != "none" ]]; then
            BASE_PATH=$(echo "$OUTPUT_PATH" | rev | cut -f 2- -d '.' | rev)
            EXPORTED_PATH="$BASE_PATH.$EXPORT_FORMAT"
            echo "exported_file_path=$EXPORTED_PATH" >> $GITHUB_OUTPUT
          else
            echo "exported_file_path=" >> $GITHUB_OUTPUT
          fi


      - name: 'Run Python Script'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ${{ steps.build_command.outputs.command }}

      - name: 'Upload Artifacts'
        # This condition checks the manual input OR the event name for pushes
        if: github.event.inputs.dry_run == 'false' || (github.event_name == 'push' && github.event.inputs.dry_run != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: tailored-documents
          path: |
            ${{ github.event.inputs.output_path || 'Tailored_Resume.md' }}
            ${{ steps.build_command.outputs.exported_file_path }}
          retention-days: 3