name: 'Manual Resume Tailor'

on:
  workflow_dispatch:
    inputs:
      resume_path:
        description: 'Path to the resume file (e.g., resume/my_resume.pdf)'
        required: true
        default: 'resume/Ulysses_Grant.md'
      jd_path:
        description: 'Path to the job description file (e.g., resume/job_description.md)'
        required: true
        default: 'resume/job_description.md'
      output_path:
        description: 'Name for the output file (e.g., Tailored_Resume.md)'
        required: true
        default: 'Tailored_Resume.md'
      export_format:
        description: 'Export format (docx, pdf, or none)'
        required: false
        type: choice
        options:
          - none
          - docx
          - pdf
        default: 'none'
      dry_run:
        description: 'Run without calling the API (true/false)'
        required: true
        type: boolean
        default: false

  push:
    branches:
      - main
      - dev

jobs:
  tailor-resume:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Set up Python 3.11'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 'Install Dependencies'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 'Prepare Execution Paths and Command'
        id: prep
        run: |
          OUTPUT_PATH="${{ github.event.inputs.output_path || 'Tailored_Resume.md' }}"
          EXPORT_FORMAT="${{ github.event.inputs.export_format || 'none' }}"
          echo "output_path=$OUTPUT_PATH" >> $GITHUB_OUTPUT
          if [[ "$EXPORT_FORMAT" != "none" ]]; then
            BASE_PATH=$(echo "$OUTPUT_PATH" | rev | cut -f 2- -d '.' | rev)
            EXPORTED_PATH="$BASE_PATH.$EXPORT_FORMAT"
            echo "exported_file_path=$EXPORTED_PATH" >> $GITHUB_OUTPUT
          fi
          RESUME_PATH="${{ github.event.inputs.resume_path || 'resume/Ulysses_Grant.md' }}"
          JD_PATH="${{ github.event.inputs.jd_path || 'resume/job_description.md' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          CMD="python tailor_resume.py --out $OUTPUT_PATH"
          if [[ "$RESUME_PATH" == *.pdf ]]; then
            CMD="$CMD --resume-pdf $RESUME_PATH"
          elif [[ "$RESUME_PATH" == *.docx ]]; then
            CMD="$CMD --resume-docx $RESUME_PATH"
          else
            CMD="$CMD --resume-md $RESUME_PATH"
          fi
          CMD="$CMD --jd $JD_PATH"
          if [[ "$EXPORT_FORMAT" != "none" ]]; then
            CMD="$CMD --export-format $EXPORT_FORMAT"
          fi
          if [[ "$DRY_RUN" == "true" ]]; then
            CMD="$CMD --dry-run"
          fi
          echo "command=$CMD" >> $GITHUB_OUTPUT
      
      - name: 'Run Python Script'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ${{ steps.prep.outputs.command }}

      - name: 'Upload Artifacts'
        if: github.event.inputs.dry_run == 'false' || (github.event_name == 'push' && github.event.inputs.dry_run != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: tailored-documents
          path: |
            ${{ steps.prep.outputs.output_path }}
            ${{ steps.prep.outputs.exported_file_path }}
          retention-days: 7