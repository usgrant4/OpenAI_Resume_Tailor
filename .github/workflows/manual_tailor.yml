name: 'Manual Resume Tailor'

on:
  workflow_dispatch:
    inputs:
      resume_path:
        description: 'Path to the resume file (e.g., resume/my_resume.pdf)'
        required: true
        default: 'resume/Ulysses_Grant.md'
      jd_path:
        description: 'Path to the job description file (e.g., resume/job_description.md)'
        required: true
        default: 'resume/job_description.md'
      output_path:
        description: 'Name for the output file (e.g., Tailored_Resume.md)'
        required: true
        default: 'Tailored_Resume.md'
      export_format:
        description: 'Export format (docx, pdf, or none)'
        required: false
        type: choice
        options:
        - none
        - docx
        - pdf
        default: 'none'
      dry_run:
        description: 'Run without calling the API (true/false)'
        required: true
        type: boolean
        default: false

jobs:
  tailor-resume:
    runs-on: ubuntu-latest

    steps:
    - name: 'Checkout Repository'
      uses: actions/checkout@v4

    - name: 'Set up Python 3.11'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 'Install LaTeX (for PDF export)'
      if: github.event.inputs.export_format == 'pdf'
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-base texlive-latex-extra

    - name: 'Install Dependencies'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 'Build the Command'
      id: build_command
      run: |
        CMD="python tailor_resume.py --out ${{ github.event.inputs.output_path }}"

        RESUME_PATH="${{ github.event.inputs.resume_path }}"
        if [[ "$RESUME_PATH" == *.pdf ]]; then
          CMD="$CMD --resume-pdf $RESUME_PATH"
        elif [[ "$RESUME_PATH" == *.docx ]]; then
          CMD="$CMD --resume-docx $RESUME_PATH"
        else
          CMD="$CMD --resume-md $RESUME_PATH"
        fi

        CMD="$CMD --jd ${{ github.event.inputs.jd_path }}"

        if [[ "${{ github.event.inputs.export_format }}" != "none" ]]; then
          CMD="$CMD --export-format ${{ github.event.inputs.export_format }}"
        fi

        if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
          CMD="$CMD --dry-run"
        fi

        echo "command=$CMD" >> $GITHUB_OUTPUT

    - name: 'Run Python Script'
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: ${{ steps.build_command.outputs.command }}

    - name: 'Upload Artifacts'
      if: github.event.inputs.dry_run == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: tailored-documents
        path: |
          ${{ github.event.inputs.output_path }}
          ${{ steps.build_command.outputs.exported_file_path }}
        retention-days: 7
